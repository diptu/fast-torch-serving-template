apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fast-torch-serving
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fast-torch-serving
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Inference is CPU-bound (see app/api/routes/predict.py's
          # concurrency limiting) so CPU is the right signal to scale on.
          averageUtilization: 70
