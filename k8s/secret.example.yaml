# Copy to secret.yaml, fill in real values, and DO NOT commit it (it's
# gitignored). Apply with: kubectl apply -f k8s/secret.yaml
#
# All three are optional — see .env.example. Leave a key out entirely
# (rather than empty-stringed) to keep that feature disabled.
apiVersion: v1
kind: Secret
metadata:
  name: fast-torch-serving-secrets
type: Opaque
stringData:
  APP_ADMIN_TOKEN: "change-me"
  APP_PREDICT_API_KEY: "change-me"
  APP_METRICS_TOKEN: "change-me"
